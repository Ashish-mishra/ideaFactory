name: Deploy Portal

on:
  push:
    branches: [main]
    paths:
      - "portal/**"
      - "ideas/**"
      - ".github/workflows/deploy-portal.yml"
  workflow_dispatch:

concurrency:
  group: deploy-portal
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ap-south-1
      AWS_PROFILE: default

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: portal/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-south-1
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Resolve stack outputs
        id: outputs
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name IdfPortalStack \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" \
            --output text)
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name IdfPortalStack \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)
          VOTES=$(aws cloudformation describe-stacks \
            --stack-name IdfVotesStack \
            --query "Stacks[0].Outputs[?OutputKey=='VotesApiUrl'].OutputValue" \
            --output text)
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"
          echo "dist=$DIST_ID" >> "$GITHUB_OUTPUT"
          echo "votes=$VOTES" >> "$GITHUB_OUTPUT"

      - name: Install + build
        working-directory: portal
        env:
          NEXT_PUBLIC_VOTES_API: ${{ steps.outputs.outputs.votes }}
        run: |
          npm ci
          npm run build

      - name: Sync to S3
        working-directory: portal
        run: |
          aws s3 sync out/ "s3://${{ steps.outputs.outputs.bucket }}/" \
            --delete \
            --cache-control "public, max-age=300, s-maxage=86400" \
            --exclude "_next/static/*"
          aws s3 sync out/_next/static/ "s3://${{ steps.outputs.outputs.bucket }}/_next/static/" \
            --cache-control "public, max-age=31536000, immutable"

      - name: CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.outputs.outputs.dist }}" \
            --paths "/*"
